name: Language Pie Chart

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    environment: bdh
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Generate language pie chart
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch all repos and aggregate language bytes
          echo "Fetching repos..."
          REPOS=$(gh api "users/fluckyflucky/repos?per_page=100&type=owner" --jq '.[].full_name')

          declare -A LANG_TOTAL
          while IFS= read -r repo; do
            echo "  Processing $repo..."
            LANGS=$(gh api "repos/$repo/languages" --jq 'to_entries[] | "\(.key) \(.value)"' 2>/dev/null || echo "")
            while IFS=' ' read -r lang bytes; do
              [ -z "$lang" ] && continue
              LANG_TOTAL["$lang"]=$(( ${LANG_TOTAL["$lang"]:-0} + bytes ))
            done <<< "$LANGS"
          done <<< "$REPOS"

          # Calculate total
          TOTAL=0
          for bytes in "${LANG_TOTAL[@]}"; do
            TOTAL=$((TOTAL + bytes))
          done

          if [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No language data found. Skipping update."
            exit 0
          fi

          # Sort by bytes desc, take top 8
          LABELS_ARR=()
          DATA_ARR=()
          while IFS=$'\t' read -r bytes lang; do
            pct=$(echo "scale=2; $bytes * 100 / $TOTAL" | bc)
            LABELS_ARR+=("$lang")
            DATA_ARR+=("$pct")
          done < <(
            for lang in "${!LANG_TOTAL[@]}"; do
              echo "${LANG_TOTAL[$lang]}"$'\t'"$lang"
            done | sort -rn | head -8
          )

          # Build JSON arrays
          LABELS_JSON=$(printf '%s\n' "${LABELS_ARR[@]}" | jq -R . | jq -s .)
          DATA_JSON=$(printf '%s\n' "${DATA_ARR[@]}" | jq -R 'tonumber' | jq -s .)
          COLORS='["#f97316","#f59e0b","#84cc16","#22c55e","#14b8a6","#3b82f6","#8b5cf6","#ec4899"]'

          CHART_BASE=$(jq -n --argjson labels "$LABELS_JSON" --argjson data "$DATA_JSON" --argjson colors "$COLORS" '{
            type: "pie",
            data: {
              labels: $labels,
              datasets: [{ data: $data, backgroundColor: $colors }]
            },
            options: {
              plugins: {
                legend: { display: false },
                datalabels: {
                  anchor: "end",
                  align: "start",
                  offset: 8,
                  font: { size: 11 },
                  formatter: "function(v,ctx){return ctx.chart.data.labels[ctx.dataIndex];}"
                }
              }
            },
            backgroundColor: "transparent"
          }')

          CHART_DARK=$(echo "$CHART_BASE" | jq -c '.options.plugins.datalabels.color = "#c9d1d9"' | tr -d '\n')
          CHART_LIGHT=$(echo "$CHART_BASE" | jq -c '.options.plugins.datalabels.color = "#24292f"' | tr -d '\n')

          IMG_DARK="https://quickchart.io/chart?w=600&h=300&c=$(printf '%s' "$CHART_DARK" | jq -sRr @uri)"
          IMG_LIGHT="https://quickchart.io/chart?w=600&h=300&c=$(printf '%s' "$CHART_LIGHT" | jq -sRr @uri)"

          sed -i "/<!--START_SECTION:waka-->/,/<!--END_SECTION:waka-->/c\<!--START_SECTION:waka-->\n[![](${IMG_DARK}#gh-dark-mode-only)![](${IMG_LIGHT}#gh-light-mode-only)](https://github.com/fluckyflucky)\n<!--END_SECTION:waka-->" README.md

      - name: Commit & push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add README.md
          git diff --staged --quiet || git commit -m "Update language chart"
          git push
