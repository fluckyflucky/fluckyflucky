name: Waka Pie Chart

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    environment: bdh
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Generate pie chart
        run: |
          if [ -z "${{ secrets.WAKATIME_API_KEY }}" ]; then
            echo "::warning::WAKATIME_API_KEY secret is not set. Skipping."
            exit 0
          fi

          RESP=$(curl -s -w "\n%{http_code}" \
            "https://wakatime.com/api/v1/users/current/stats/last_7_days?api_key=${{ secrets.WAKATIME_API_KEY }}")

          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::WakaTime API returned HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          # Debug: check response structure
          LANG_COUNT=$(echo "$BODY" | jq -r '.data.languages | length')
          echo "Language count: $LANG_COUNT"

          if [ "$LANG_COUNT" = "null" ] || [ "$LANG_COUNT" -eq 0 ]; then
            echo "::warning::No language data in last 7 days. Skipping update."
            echo "Full response:"
            echo "$BODY" | jq .
            exit 0
          fi

          LANGS=$(echo "$BODY" | jq -c '[.data.languages[:8] | .[] | {label: .name, pct: .percent}]')

          LABELS=$(echo "$LANGS" | jq '[.[].label]')
          DATA=$(echo "$LANGS" | jq '[.[].pct]')
          COLORS='["#f97316","#f59e0b","#84cc16","#22c55e","#14b8a6","#3b82f6","#8b5cf6","#ec4899"]'

          CHART=$(jq -n --argjson labels "$LABELS" --argjson data "$DATA" --argjson colors "$COLORS" '{
            type: "pie",
            data: {
              labels: $labels,
              datasets: [{ data: $data, backgroundColor: $colors }]
            },
            options: {
              plugins: {
                legend: { position: "right", labels: { color: "#c9d1d9", font: { size: 11 } } }
              }
            }
          }')

          ENCODED=$(echo "$CHART" | jq -sRr @uri)
          IMG="https://quickchart.io/chart?w=500&h=300&c=${ENCODED}"

          sed -i "/<!--START_SECTION:waka-->/,/<!--END_SECTION:waka-->/c\<!--START_SECTION:waka-->\n[![](${IMG})](https://wakatime.com/@fluckyflucky)\n<!--END_SECTION:waka-->" README.md

      - name: Commit & push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add README.md
          git diff --staged --quiet || git commit -m "Update WakaTime chart"
          git push
