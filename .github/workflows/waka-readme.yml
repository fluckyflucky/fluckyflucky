name: Waka Pie Chart

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate pie chart
        run: |
          # Fetch WakaTime stats
          RESP=$(curl -s "https://wakatime.com/api/v1/users/current/stats/last_7_days" \
            -H "Authorization: Basic $(echo -n "${{ secrets.WAKATIME_API_KEY }}" | base64)")

          # Extract top 8 languages
          LANGS=$(echo "$RESP" | jq -c '[.data.languages[:8] | .[] | {label: .name, pct: .percent}]')

          # Build Chart.js config
          LABELS=$(echo "$LANGS" | jq '[.[].label]')
          DATA=$(echo "$LANGS" | jq '[.[].pct]')
          COLORS='["#f97316","#f59e0b","#84cc16","#22c55e","#14b8a6","#3b82f6","#8b5cf6","#ec4899"]'

          CHART=$(jq -n --argjson labels "$LABELS" --argjson data "$DATA" --argjson colors "$COLORS" '{
            type: "pie",
            data: {
              labels: $labels,
              datasets: [{ data: $data, backgroundColor: $colors }]
            },
            options: {
              plugins: {
                legend: { position: "right", labels: { color: "#c9d1d9", font: { size: 11 } } }
              }
            }
          }')

          # URL-encode and build image URL
          ENCODED=$(echo "$CHART" | jq -sRr @uri)
          IMG="https://quickchart.io/chart?w=500&h=300&c=${ENCODED}"

          # Update README
          sed -i "/<!--START_SECTION:waka-->/,/<!--END_SECTION:waka-->/c\<!--START_SECTION:waka-->\n[![](${IMG})](https://wakatime.com/@fluckyflucky)\n<!--END_SECTION:waka-->" README.md

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update WakaTime chart"
          git push
